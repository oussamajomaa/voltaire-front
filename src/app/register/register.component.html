<h2 class="title">List of users</h2>
<div class="users">
    <table mat-table [dataSource]="users" class="mat-elevation-z8">

        <!-- Email Column -->
        <ng-container matColumnDef="Email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>

        <!-- Role Column -->
        <ng-container matColumnDef="Rôle">
            <th mat-header-cell *matHeaderCellDef> Rôle </th>
            <td mat-cell *matCellDef="let element"> {{element.role}} </td>
        </ng-container>

        <ng-container matColumnDef="Actions">
            <th mat-header-cell *matHeaderCellDef class="text-center"> Actions </th>
            <td mat-cell *matCellDef="let element" class="actions text-center">
                <mat-icon (click)="deleteUser(element.id)" color="warn">delete</mat-icon>
                <mat-icon (click)="updateUser(element.id)" color="primary">edit</mat-icon>
            </td>
        </ng-container>



        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    
    <div>
        <button mat-mini-fab color="primary" (click)="addUser()">
            <mat-icon>add</mat-icon>
        </button>
    </div>
    <div class="msg mat-elevation-z8 " *ngIf="onDelete">
        <h3 >Are you sur to delete this item?</h3>
        <div class="buttons">
            <button mat-raised-button color="warn" (click)="confirmDelete()">Yes</button>
            <button mat-raised-button (click)="cancelDelete()" color="primary">Cancel</button>
        </div>
    </div>

    <div class="msg mat-elevation-z8 " *ngIf="onUpdate">
        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Choisir le rôle</mat-label>
            <mat-select [(ngModel)]="role">
                <mat-option value="supervisor">Supervisor</mat-option>
                <mat-option value="admin">Admin</mat-option>
                <mat-option value="user">User</mat-option>
            </mat-select>
        </mat-form-field>
        <div class="buttons">
            <button mat-raised-button color="warn" (click)="confirmUpdate()">Yes</button>
            <button mat-raised-button (click)="cancelUpdate()" color="primary">Cancel</button>
        </div>
    </div>
</div>


<form [formGroup]="form" *ngIf="onAddUser">
    <h2 class="title">Add user</h2>
    <div class="register mat-elevation-z8 p-3 mt-3" >
        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Email</mat-label>
            <input matInput placeholder="Email" formControlName="email">
        </mat-form-field>

        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Mot de passe</mat-label>
            <input matInput type="password" placeholder="Mot de passe" formControlName="password">
        </mat-form-field>

        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Choisir le rôle</mat-label>
            <mat-select formControlName="role">
                <mat-option value="supervisor">Supervisor</mat-option>
                <mat-option value="admin">Admin</mat-option>
                <mat-option value="user">User</mat-option>
            </mat-select>
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="submit()" class="mt-3">Valider</button>
    </div>
</form>
