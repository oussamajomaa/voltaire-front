<div>
    <h2 *ngIf="book" class="title">Update of the book titled: <span class="book-title">{{book.title}}</span></h2>
    <div class="update-book container  mat-elevation-z8 p-3 rounded">

        <div *ngIf="book">
            <div class="parent-card">
                <div class="card">
                    <mat-label>Title</mat-label>
                    <input matInput [(ngModel)]="book.title" value={{book.title}} (input)="valuechange($event)">
                </div>
                <div class="card">
                    <mat-label>Choose contibutor</mat-label>
                    <mat-select multiple [(ngModel)]="selectedContributors" >
                        <mat-option *ngFor="let contributor of contributors" value="{{contributor.name}}">{{contributor.name}}
                        </mat-option>
                    </mat-select>
                </div>
                <!--<div class="card" *ngFor="let contributor of contributors, let i = index">
                        <mat-label>{{contributor.status}} {{i+1}}</mat-label>
                        <h3>{{contributor.name}}</h3>
                    </div>-->


                <div class=" card">
                    <mat-label>Publisher</mat-label>
                    <input matInput [(ngModel)]="book.publisher" value="{{book.publisher}}">
                </div>
                <div class=" card">
                    <mat-label>Type document</mat-label>
                    <input matInput [(ngModel)]="book.type_document" value="{{book.type_document}}">
                </div>
                <div class=" card">
                    <mat-label>Publication place</mat-label>
                    <input matInput [(ngModel)]="book.publication_place" value="{{book.publication_place}}">
                </div>

                <div class=" card">
                    <mat-label>Publication date</mat-label>
                    <input matInput [(ngModel)]="book.publication_date" value="{{book.publication_date}}">
                </div>


                <div class="card">
                    <mat-label>Multi Volume</mat-label>
                    <mat-select [(ngModel)]="book.multivolume" >
                        <mat-option value="yes">Yes</mat-option>
                        <mat-option value="no">No</mat-option>
                    </mat-select>
                </div>
                <div class="card">
                    <mat-label>Volume</mat-label>
                    <input matInput type="number" min="1" [(ngModel)]="book.volume" value="{{book.volume}}">
                </div>
                <div class="card">
                    <mat-label>Format</mat-label>
                    <input matInput [(ngModel)]="book.format" value="{{book.format}}">
                </div>
                <div class="card">
                    <mat-label>Source</mat-label>
                    <input matInput [(ngModel)]="book.source" value="{{book.source}}">
                </div>
                <div class="card">
                    <mat-label>Marginalia</mat-label>
                    <input matInput [(ngModel)]="book.marginalia" value="{{book.marginalia}}">

                </div>
                <div class="card">
                    <mat-label>Binding</mat-label>
                    <input matInput [(ngModel)]="book.binding" value="{{book.binding}}">
                </div>


                <div class="card">
                    <mat-label>Library</mat-label>
                    <input matInput [(ngModel)]="book.library" value="{{book.library}}">
                </div>
                <div class="card">
                    <mat-label>Cote</mat-label>
                    <input matInput [(ngModel)]="book.cote" value="{{book.cote}}">
                </div>
                <div class="card">
                    <mat-label>Provenance</mat-label>
                    <input matInput [(ngModel)]="book.provenance" value="{{book.provenance}}">
                </div>
                <div class="card">
                    <mat-label>Ferney</mat-label>
                    <input matInput [(ngModel)]="book.ferney" value="{{book.ferney}}">
                </div>
                <div class="card">
                    <mat-label>Digital Voltaire</mat-label>
                    <input matInput [(ngModel)]="book.digital_voltaire" value="{{book.digital_voltaire}}">
                </div>
                <div class="card">
                    <mat-label>External resource</mat-label>
                    <input matInput [(ngModel)]="book.external_resource" value="{{book.external_resource}}">
                </div>


                <div class="card card-note">
                    <mat-label>Notes</mat-label>
                    <textarea matInput [(ngModel)]="book.notes" value="{{book.notes}}"></textarea>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-around">
            <button mat-raised-button color="primary" (click)="submit()" class="mt-6">Update</button>
            <button mat-raised-button color="warn" (click)="cancelUpdate()" class="mt-6">Cancel</button>
        </div>
    </div>
</div>
