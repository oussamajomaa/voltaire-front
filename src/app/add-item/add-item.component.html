<form [formGroup]="form">
    <h2 class="title">Add an item</h2>
    <div class="add-book container mat-elevation-z8 p-3 rounded">

        <div>
            <div class="row">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Titre</mat-label>
                        <input matInput placeholder="Titre" formControlName="title">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Choose contibutor</mat-label>
                        <mat-select [(ngModel)]="contibutorStatus" (selectionChange)="slectChange($event)" [ngModelOptions]="{standalone: true}">
                            <mat-option value="author">Author</mat-option>
                            <mat-option value="translator">Translator</mat-option>
                            <mat-option value="editor">Editor</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Choose contibutor</mat-label>
                        <mat-select multiple [(ngModel)]="savedContributors" [ngModelOptions]="{standalone: true}" >
                          <mat-option *ngFor="let contributor of contributors" value="{{contributor.id}}" >{{contributor.name}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
               
               <!-- <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Contributor</mat-label>
                        <input matInput placeholder="Contributor" formControlName="contributor">
                    </mat-form-field>
                </div>-->
            </div>
            <div class="row">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Publisher</mat-label>
                        <input matInput placeholder="Publisher" formControlName="publisher">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Type document</mat-label>
                        <input matInput placeholder="Type document" formControlName="type_document">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Publication place</mat-label>
                        <input matInput placeholder="Publication place" formControlName="publication_place">
                    </mat-form-field>
                </div>
                
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Publication date</mat-label>
                        <input matInput placeholder="Publication date" type="number" min="1000" max="2000" minlength="4"
                            pattern="^0[1-9]|[1-9]\d$" formControlName="publication_date">

                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <div class="radio-class">
                        <mat-label>Multi volume</mat-label>
                        <div class="radio-select">
                            <div class="radio-label">
                                <input id="radioYes" type="radio" value="yes" formControlName="multivolume" (click)="onMultivolumeClick($event)">
                                <label for="radioYes">Yes</label>
                            </div>
                            <div class="radio-label">
                                <input id="radionNo" type="radio" value="no" formControlName="multivolume" (click)="onMultivolumeClick($event)">
                                <label for="radionNo">No</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Volume</mat-label>
                        <input matInput *ngIf="!onMultivolume" readonly type="number" min="1" placeholder="Volume" formControlName="volume">
                        <input matInput *ngIf="onMultivolume" readonly=false type="number" min="1" placeholder="Volume" formControlName="volume">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Format</mat-label>
                        <input matInput placeholder="Format" formControlName="format">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Source</mat-label>
                        <input matInput placeholder="Source" formControlName="source">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Marginalia</mat-label>
                        <input matInput placeholder="Marginalia" formControlName="marginalia">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Binding</mat-label>
                        <input matInput placeholder="Binding" formControlName="binding">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Library</mat-label>
                        <input matInput placeholder="Library" formControlName="library">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Cote</mat-label>
                        <input matInput placeholder="Cote" formControlName="cote">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Provenance</mat-label>
                        <input matInput placeholder="Provenance" formControlName="provenance">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Ferney</mat-label>
                        <input matInput placeholder="Ferney" formControlName="ferney">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Digital Voltaire</mat-label>
                        <input matInput placeholder="Digital Voltaire" formControlName="digital_voltaire">
                    </mat-form-field>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>External resource</mat-label>
                        <input matInput placeholder="External resource" formControlName="external_resource">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <mat-form-field class="w-100" appearance="fill">
                        <mat-label>Notes</mat-label>
                        <textarea matInput placeholder="Notes" rows="5" formControlName="notes"></textarea>
                    </mat-form-field>
                </div>
            </div>
        </div>

        <button mat-raised-button color="primary" (click)="submit()" class="mt-6">Submit</button>
    </div>
</form>
