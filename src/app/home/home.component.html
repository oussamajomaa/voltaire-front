<div class="container">
    <div class="mb-5" *ngIf="books.length > 0">
        <h2 class="title">List of books</h2>
        <div style="overflow-x:auto;" class=" mat-elevation-z8 p-3 rounded mb-2">
            <table>
                <tr>
                    <th>Title</th>
                    <th>Contributor</th>
                    <th>Publisher</th>
                    <th>Publication Date</th>
                    <th>Publication Place</th>
                    <!--<th>Type document</th>
                    <th>Multi volume</th>
                    <th>Volume</th>
                    <th>Format</th>
                    <th>Source</th>
                    <th>Marginalia</th>
                    <th>Binding</th>
                    <th>Library</th>
                    <th>Cote</th>
                    <th>Provenance</th>
                    <th>Ferney</th>
                    <th>External resource</th>
                    <th>Notes</th>
                    <th>User</th>-->
                    <th *ngIf="role === 'admin' || role === 'supervisor'">Actions</th>
                </tr>
                <tr *ngFor="let book of pageSlice">

                    <td class="">
                        {{book.title}}
                    </td>
                    <td class="">
                        {{book.contributor}}
                    </td>
                    <td class="">
                        {{book.publisher}}
                    </td>
                    <td class="">
                        {{book.publication_date}}
                    </td>
                    <td class="">
                        {{book.publication_place}}
                    </td>
                    <!--<td class="">
                        {{book.type_document}}
                    </td>
                    <td class="">
                        {{book.multivolume}}
                    </td>
                    <td class="">
                        {{book.volume}}
                    </td>
                    <td class="">
                        {{book.format}}
                    </td>
                    <td class="">
                        {{book.source}}
                    </td>
                    <td class="">
                        {{book.marginalia}}
                    </td>
                    <td class="">
                        {{book.binding}}
                    </td>
                    <td class="">
                        {{book.library}}
                    </td>
                    <td class="">
                        {{book.cote}}
                    </td>
                    <td class="">
                        {{book.provenance}}
                    </td>
                    <td class="">
                        {{book.ferney}}
                    </td>
                    <td class="">
                        {{book.external_resource}}
                    </td>
                    <td class="">
                        {{book.notes | slice:0:20}}...
                    </td>
                    <td class="">
                        {{book.email}}
                    </td>-->
                    <td class="actions" *ngIf="role === 'admin' || role === 'supervisor'">
                        <mat-icon (click)="updateItem(book.id)" matTooltip="edit" color="primary">edit</mat-icon>
                        <mat-icon (click)="deleteBook(book.id)" matTooltip="delete" color="warn">delete</mat-icon>
                        <mat-icon (click)="showItem(book.id)" matTooltip="show" color="warning">visibility</mat-icon>
                    </td>
                </tr>
            </table>


            <div class="">
                <mat-paginator [length]="books.length" [pageSize]="10" [pageSizeOptions]="[10,15]"
                    (page)="onPageChange($event)">
                </mat-paginator>
            </div>
        </div>

        <div class="msg mat-elevation-z8" *ngIf="onDelete">
            <h3 class="">Are you sur to delete this item?</h3>
            <div class="buttons">
                <button mat-raised-button color="warn" (click)="confirmDelete()">Yes</button>
                <button mat-raised-button (click)="cancelDelete()" color="primary">Cancel</button>
            </div>
        </div>
    </div>
</div>
