<h2 class="title">List of contributors</h2>
<div class="contributor mat-elevation-z8 p-3 mb-3">
    <div>
        <table>

            <tr>
                <th class="col-6">Name</th>
                <th class="col-2">Status</th>
                <th class="col-4 text-center">Actions</th>
            </tr>

            <tr *ngFor="let contributor of pageSlice">
                <td class="col-6">{{contributor.name}}</td>
                <td class="col-2">{{contributor.status}}</td>
                <td class="col-6 actions text-center">
                    <mat-icon (click)="deleteContributor(contributor.id)" style="margin-right: 10px;" color="warn"
                        matTooltip="delete">delete</mat-icon>
                    <mat-icon (click)="updateContributor(contributor.id,contributor.name,contributor.status)" color="primary" matTooltip="update">edit
                    </mat-icon>
                </td>

            </tr>
        </table>

    </div>
    <div>
        <button *ngIf="!onAdd" mat-mini-fab color="primary" (click)="addContributor()" matTooltip="new contributor">
            <mat-icon>add</mat-icon>
        </button>
        <button *ngIf="onAdd" mat-mini-fab color="primary" (click)="cancelAddContributor()" matTooltip="cancel">
            <mat-icon>keyboard_arrow_up</mat-icon>
        </button>
    </div>

    <!-- Pagination -->
    <div class="">
        <mat-paginator [length]="contributors.length" [pageSize]="7" [pageSizeOptions]="[7,14]"
            (page)="onPageChange($event)">
        </mat-paginator>
    </div>

    <div class="msg mat-elevation-z8 " *ngIf="onDelete">
        <h3>Are you sur to delete this item?</h3>
        <div class="buttons">
            <button mat-raised-button color="warn" (click)="confirmDelete()">Yes</button>
            <button mat-raised-button (click)="cancelDelete()" color="primary">Cancel</button>
        </div>
    </div>
</div>

<div *ngIf="onUpdate" class="contributor mat-elevation-z8 p-3 mt-3">
    <h2 class="title">Update contributor</h2>
    <div>
        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="name" placeholder="Name">
        </mat-form-field>
        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Select status</mat-label>
            <mat-select [(ngModel)]="status">
                <mat-option value="author">Author</mat-option>
                <mat-option value="translator">Translator</mat-option>
                <mat-option value="editor">Editor</mat-option>
            </mat-select>
        </mat-form-field>
        <div class="buttons">
            <button mat-raised-button color="warn" (click)="confirmUpdate()">Yes</button>
            <button mat-raised-button (click)="cancelUpdate()" color="primary">Cancel</button>
        </div>
    </div>
</div>

<form [formGroup]="form" *ngIf="onAdd">
    <h2 class="title">Add contributor</h2>
    <div class="contributor mat-elevation-z8 p-3 mt-3">
        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Name</mat-label>
            <input matInput placeholder="Name" formControlName="name">
        </mat-form-field>

        <mat-form-field class="w-100" appearance="fill">
            <mat-label>Select status</mat-label>
            <mat-select formControlName="status">
                <mat-option value="author">Author</mat-option>
                <mat-option value="translator">Translator</mat-option>
                <mat-option value="editor">Editor</mat-option>
            </mat-select>
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="submit()" class="mt-3">Submit</button>
    </div>
</form>
